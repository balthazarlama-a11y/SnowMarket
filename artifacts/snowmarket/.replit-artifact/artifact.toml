kind = "web"
previewPath = "/"
title = "Snowmarket"
version = "1.0.0"
id = "artifacts/snowmarket"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24579
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/snowmarket run dev"

[services.env]
PORT = "24579"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/snowmarket", "run", "build"]
publicDir = "artifacts/snowmarket/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
