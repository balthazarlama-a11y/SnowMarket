openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Snowmarket API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: apartments
    description: Apartment rental listings
  - name: equipment
    description: Ski equipment marketplace
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /apartments:
    get:
      operationId: listApartments
      tags: [apartments]
      summary: List apartments
      description: Returns a list of apartment listings
      responses:
        "200":
          description: List of apartments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Apartment"
  /equipment:
    get:
      operationId: listEquipment
      tags: [equipment]
      summary: List equipment
      description: Returns a list of ski equipment listings
      responses:
        "200":
          description: List of equipment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Apartment:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        resort:
          type: string
        pricePerNight:
          type: number
        bedrooms:
          type: integer
        maxGuests:
          type: integer
        verified:
          type: boolean
        rating:
          type: number
        reviewCount:
          type: integer
        imageUrl:
          type: string
        amenities:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - location
        - resort
        - pricePerNight
        - bedrooms
        - maxGuests
        - verified
        - rating
        - reviewCount
        - imageUrl
        - amenities
    Equipment:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        condition:
          type: string
        price:
          type: number
        seller:
          type: string
        verified:
          type: boolean
        purchaseType:
          type: string
          enum: [normal, verified]
        imageUrl:
          type: string
        size:
          type: string
        brand:
          type: string
      required:
        - id
        - title
        - category
        - condition
        - price
        - seller
        - verified
        - purchaseType
        - imageUrl
        - brand
